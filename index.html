<!doctype html>
<html lang="en" dir="ltr">

    <meta charset="UTF-8" />

    <meta name="theme-color" content="#0a0a0a" />
    <link rel="preconnect" href="https://ansygroup.github.io" crossorigin />
    <link rel="dns-prefetch" href="https://ansygroup.github.io" />
    <meta
      name="description"
      content="ANSY — practical books on leadership, business, productivity & self-development by ANSY. Instant PDF download. Start at $9.99."
    />
    <link rel="canonical" href="https://ansygroup.github.io/ebook-store/" />

    <!-- Meta Pixel: loaded from /pixel.js (set VITE_META_PIXEL_ID at build → public/pixel.js) -->
    <script src="/pixel.js" defer></script>

    <title>ANSY · Practical Books for People Who Build</title>

    <!-- JSON-LD: BookStore -->

      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://ansygroup.github.io/ebook-store/shop"
      },
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "E-Book Catalog",
        "itemListElement": [
          { "@type": "Offer", "itemOffered": { "@type": "Book", "name": "The Influential Leader", "bookFormat": "EBook", "inLanguage": "en" }, "price": "14.99", "priceCurrency": "USD" },
          { "@type": "Offer", "itemOffered": { "@type": "Book", "name": "Build Your Empire", "bookFormat": "EBook", "inLanguage": "en" }, "price": "19.99", "priceCurrency": "USD" },
          { "@type": "Offer", "itemOffered": { "@type": "Book", "name": "Deep Productivity", "bookFormat": "EBook", "inLanguage": "en" }, "price": "12.99", "priceCurrency": "USD" },
          { "@type": "Offer", "itemOffered": { "@type": "Book", "name": "Design Your Mindset", "bookFormat": "EBook", "inLanguage": "en" }, "price": "11.99", "priceCurrency": "USD" },
          { "@type": "Offer", "itemOffered": { "@type": "Book", "name": "Tech for Everyone", "bookFormat": "EBook", "inLanguage": "en" }, "price": "16.99", "priceCurrency": "USD" },
          { "@type": "Offer", "itemOffered": { "@type": "Book", "name": "Health Without Limits", "bookFormat": "EBook", "inLanguage": "en" }, "price": "9.99", "priceCurrency": "USD" },
          { "@type": "Offer", "itemOffered": { "@type": "Book", "name": "The Art of Negotiation", "bookFormat": "EBook", "inLanguage": "en" }, "price": "14.99", "priceCurrency": "USD" },
          { "@type": "Offer", "itemOffered": { "@type": "Book", "name": "Smart Investing", "bookFormat": "EBook", "inLanguage": "en" }, "price": "18.99", "priceCurrency": "USD" },
          { "@type": "Offer", "itemOffered": { "@type": "Book", "name": "Content Craft", "bookFormat": "EBook", "inLanguage": "en" }, "price": "13.99", "priceCurrency": "USD" },
          { "@type": "Offer", "itemOffered": { "@type": "Book", "name": "Learn Languages", "bookFormat": "EBook", "inLanguage": "en" }, "price": "10.99", "priceCurrency": "USD" }
        ]
      }
    }
    </script>

    <!-- JSON-LD: FAQ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        { "@type": "Question", "name": "What is ANSY?", "acceptedAnswer": { "@type": "Answer", "text": "ANSY is a practical ebook store with 10 titles on leadership, business, productivity and self-development, written by ANSY. Instant PDF download." } },
        { "@type": "Question", "name": "How much do the ebooks cost?", "acceptedAnswer": { "@type": "Answer", "text": "Prices start at $9.99 and go up to $19.99 depending on the book, with secure checkout via Stripe." } },
        { "@type": "Question", "name": "What language are the books in?", "acceptedAnswer": { "@type": "Answer", "text": "Every title on ANSY is written in English." } },
        { "@type": "Question", "name": "How do I get the book after purchase?", "acceptedAnswer": { "@type": "Answer", "text": "After paying via Stripe you get the download link instantly, plus a confirmation email with the PDF link." } },
        { "@type": "Question", "name": "Is the download instant?", "acceptedAnswer": { "@type": "Answer", "text": "Yes — all books are ready-to-download PDFs available immediately after checkout." } }
      ]
    }
    </script>

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:site_name" content="ANSY" />
    <meta property="og:title" content="ANSY · Practical Books for People Who Build" />
    <meta
      property="og:description"
      content="Practical books on leadership, business, productivity & self-development by ANSY. Instant PDF download."
    />
    <meta property="og:image" content="https://ansygroup.github.io/ebook-store/og-cover.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:url" content="https://ansygroup.github.io/ebook-store/" />

    <!-- Content Security Policy: allow external API (Worker), Stripe, Meta Pixel, and inline scripts (SPA) -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; img-src 'self' data: https:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://connect.facebook.net; connect-src 'self' https:; frame-src 'self' https://buy.stripe.com https://js.stripe.com"
    />

    <!-- SEO keywords -->
    <meta
      name="keywords"
      content="ebooks, leadership books, self improvement, productivity, business books, investing, negotiation, content marketing, learn languages, personal development, health, technology, ANSY"
    />
    <meta name="author" content="ANSY" />

    <!-- JSON-LD: WebSite (search box / brand) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "ANSY",
      "url": "https://ansygroup.github.io/ebook-store/",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://ansygroup.github.io/ebook-store/shop",
        "query-input": "required name=search_term"
      }
    }
    </script>

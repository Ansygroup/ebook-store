name: Deploy to Vercel

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: vercel-deploy
  cancel-in-progress: true

jobs:
  verify-and-deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE: ${{ secrets.VITE_API_BASE || 'https://ebook-store-api.your-subdomain.workers.dev' }}
          VITE_SELLER_EMAIL: ${{ secrets.SELLER_EMAIL }}
          VITE_NEWSLETTER_URL: ${{ secrets.NEWSLETTER_URL }}
          COMPOSIO_API_KEY: ${{ secrets.COMPOSIO_API_KEY }}
          GMAIL_ACCOUNT: ${{ secrets.GMAIL_ACCOUNT }}

      - name: Deploy to Vercel (production)
        continue-on-error: true
        run: |
          npm i -g vercel@latest
          vercel pull --yes --environment=production --token "$VERCEL_TOKEN"
          vercel build --prod --token "$VERCEL_TOKEN"
          vercel deploy --prebuilt --prod --token "$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Ping search engines (sitemap)
        if: success()
        run: |
          SITEMAP="https://ansygroup.github.io/ebook-store/sitemap.xml"
          curl -s -o /dev/null -w "Google: %{http_code}\n" "https://www.google.com/ping?sitemap=$SITEMAP"
          curl -s -o /dev/null -w "Bing:   %{http_code}\n" "https://www.bing.com/ping?sitemap=$SITEMAP"

name: Marketing Automation

on:
  schedule:
    - cron: '0 9 * * *'   # daily 09:00 UTC — post one IG + weekly email batch
    - cron: '0 6 * * 0'   # Sundays 06:00 UTC — publish a new auto blog post (every 2 weeks via dedup)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ig-post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - run: npm ci
      # Posts the next staged IG caption+image from ig-queue/ via Composio (if IG linked)
      - run: node scripts/ig_promote.mjs
        env:
          COMPOSIO_API_KEY: ${{ secrets.COMPOSIO_API_KEY }}
          IG_ACCOUNT: ${{ secrets.IG_ACCOUNT }}

  email-batch:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 9 * * 1'   # Mondays only
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - run: npm ci
      - run: SEND=1 node scripts/send-sequence.mjs
        env:
          COMPOSIO_API_KEY: ${{ secrets.COMPOSIO_API_KEY }}
          GMAIL_ACCOUNT: ${{ secrets.GMAIL_ACCOUNT }}
          SELLER_EMAIL: ${{ secrets.SELLER_EMAIL }}

  auto-blog:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 6 * * 0'   # Sundays
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - run: npm ci
      - run: node scripts/auto-blog.mjs
      - name: Commit & push if a new post was added
        run: |
          if git diff --quiet src/data/posts.json; then
            echo "no new post"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add src/data/posts.json public/blog/
            git commit -m "content: auto-published blog post ($(date +%F))"
            git push

  site-watch:
    runs-on: ubuntu-latest
    steps:
      - name: Health-check + perf probe the live store
        run: |
          BASE="https://ansygroup.github.io/ebook-store"
          check() { # url -> prints status (200/301 ok)
            curl -s -o /dev/null -w "%{http_code}" -m 20 "$1"
          }
          rt() { # url -> prints total connect+transfer time in ms
            curl -s -o /dev/null -w "%{time_total}" -m 20 "$1" | awk '{printf "%d", $1*1000}'
          }
          HOME=$(check "$BASE/");        HOME_RT=$(rt "$BASE/")
          SHOP=$(check "$BASE/shop/");   SHOP_RT=$(rt "$BASE/shop/")
          BLOG=$(check "$BASE/blog/");   BLOG_RT=$(rt "$BASE/blog/")
          BOOK=$(check "$BASE/book/the-influential-leader/")
          PDF=$(check "$BASE/downloads/the-influential-leader.pdf")
          JS=$(check "$BASE/$(curl -s "$BASE/" | grep -o '/assets/[^"]*\.js' | head -1)")
          echo "home=$HOME(${HOME_RT}ms) shop=$SHOP(${SHOP_RT}ms) blog=$BLOG(${BLOG_RT}ms) book=$BOOK pdf=$PDF js=$JS"
          ok() { [ "$1" = "200" ] || [ "$1" = "301" ]; }
          if ! ok "$HOME"; then echo "::error::Home down ($HOME)"; exit 1; fi
          if ! ok "$SHOP"; then echo "::warning::Shop issue ($SHOP)"; fi
          if ! ok "$BLOG"; then echo "::warning::Blog issue ($BLOG)"; fi
          if [ "$BOOK" != "200" ]; then echo "::warning::Book page ($BOOK)"; fi
          if [ "$PDF" != "200" ]; then echo "::warning::PDF sample missing ($PDF)"; fi
          if ! ok "$JS"; then echo "::warning::JS bundle ($JS)"; fi
          if [ "$HOME_RT" -gt 3000 ]; then echo "::warning::Home slow (${HOME_RT}ms)"; fi
      - name: Notify via issue if down
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner, repo: context.repo.repo,
              title: '🚨 Store health-check FAILED',
              body: 'The live site returned a non-200 status. Check GitHub Pages + Actions.'
            })

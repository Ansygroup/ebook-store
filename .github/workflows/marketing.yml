name: Marketing Automation

on:
  schedule:
    - cron: '0 9 * * *'   # daily 09:00 UTC — post one IG + weekly email batch
    - cron: '0 6 * * 0'   # Sundays 06:00 UTC — publish a new auto blog post (every 2 weeks via dedup)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ig-post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - run: npm ci
      # Posts the next staged IG caption+image from ig-queue/ via Composio (if IG linked)
      - run: node scripts/ig_promote.mjs
        env:
          COMPOSIO_API_KEY: ${{ secrets.COMPOSIO_API_KEY }}
          IG_ACCOUNT: ${{ secrets.IG_ACCOUNT }}

  email-batch:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 9 * * 1'   # Mondays only
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - run: npm ci
      - run: SEND=1 node scripts/send-sequence.mjs
        env:
          COMPOSIO_API_KEY: ${{ secrets.COMPOSIO_API_KEY }}
          GMAIL_ACCOUNT: ${{ secrets.GMAIL_ACCOUNT }}
          SELLER_EMAIL: ${{ secrets.SELLER_EMAIL }}

  auto-blog:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 6 * * 0'   # Sundays
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - run: npm ci
      - run: node scripts/auto-blog.mjs
      - name: Commit & push if a new post was added
        run: |
          if git diff --quiet src/data/posts.json; then
            echo "no new post"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add src/data/posts.json public/blog/
            git commit -m "content: auto-published blog post ($(date +%F))"
            git push

  site-watch:
    runs-on: ubuntu-latest
    steps:
      - name: Health-check the live store
        run: |
          BASE="https://ansygroup.github.io/ebook-store"
          HOME=$(curl -s -o /dev/null -w "%{http_code}" -m 20 "$BASE/")
          SHOP=$(curl -s -o /dev/null -w "%{http_code}" -m 20 "$BASE/shop")
          BLOG=$(curl -s -o /dev/null -w "%{http_code}" -m 20 "$BASE/blog")
          PDF=$(curl -s -o /dev/null -w "%{http_code}" -m 20 "$BASE/downloads/the-influential-leader.pdf")
          echo "home=$HOME shop=$SHOP blog=$BLOG pdf=$PDF"
          if [ "$HOME" != "200" ]; then echo "::error::Home down ($HOME)"; exit 1; fi
          if [ "$SHOP" != "200" ]; then echo "::warning::Shop issue ($SHOP)"; fi
          if [ "$BLOG" != "200" ]; then echo "::warning::Blog issue ($BLOG)"; fi
          if [ "$PDF" != "200" ]; then echo "::warning::PDF sample missing ($PDF)"; fi
      - name: Notify via issue if down
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner, repo: context.repo.repo,
              title: '🚨 Store health-check FAILED',
              body: 'The live site returned a non-200 status. Check GitHub Pages + Actions.'
            })
